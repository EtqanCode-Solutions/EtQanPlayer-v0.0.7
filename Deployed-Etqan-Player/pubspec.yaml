name: etqan_player
description: "Secure video player for educational platform with screen protection."
publish_to: "none"

version: 1.0.0+7

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Security & Screenshot Protection
  no_screenshot: ^0.3.1
  secure_application: ^4.1.0

  # Video Players
  youtube_player_flutter: ^9.0.3
  video_player: ^2.9.2
  webview_flutter: ^4.10.0

  # Desktop Video Player (Windows/macOS/Linux)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # Platform-specific media_kit libraries
  media_kit_libs_windows_video: ^1.0.9
  media_kit_libs_linux: ^1.1.3
  media_kit_libs_macos_video: ^1.1.4

  # YouTube URL Extraction
  youtube_explode_dart: ^2.2.3

  # Networking
  dio: ^5.7.0

  # State Management
  provider: ^6.1.2

  # Desktop Window Management
  window_manager: ^0.4.3

  # Command Line Parsing
  args: ^2.6.0

  # Platform Detection
  device_info_plus: ^11.1.1

  # Deep Linking
  app_links: ^6.3.3

  # Local Storage
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png" # استخدام PNG لـ Android و iOS
  remove_alpha_ios: true
  adaptive_icon_background: "#00000000" # شفاف - بدون خلفية
  adaptive_icon_foreground: "assets/images/icon.png"
